version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: mnemi-test-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mnemi-test-network

networks:
  mnemi-test-network:
    driver: bridge
